    <h2 class="division-header">Thánh thi “Lạy Thiên Chúa”  <span>(Te Deum)</span></h2>
<p>Lạy Thiên Chúa,<br/>
            Chúng con xin ca ngợi hát mừng,<br/>
            Tuyên xưng Ngài là Đức Chúa.</p>
<p>Chúa là Cha, Đấng trường tồn vạn đại,<br/>
            Hoàn vũ này kính cẩn suy tôn.</p>
