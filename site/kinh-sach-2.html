    <h2 class="division-header">Thánh thi </h2>
<p>Muôn lạy Đức Ki-tô là Thủ Lãnh,<br/>Chúa dẫn đầu các mục tử đoàn chiên,<br/>Ngày hôm nay, dân Chúa được toại nguyền,<br/>Mừng mục tử, bậc thánh nhân hiền hậu.</p>
