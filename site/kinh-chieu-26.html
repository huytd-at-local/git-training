    <p>
            Chúa hạ bệ những ai quyền thế,<br/>
            Người nâng cao mọi kẻ khiêm nhường.
        </p>
<p>
            Kẻ đói nghèo, Chúa ban của đầy dư,<br/>
            Người giàu có, lại đuổi về tay trắng.
        </p>
<p>

            Như đã hứa cùng cha ông chúng ta.
        </p>
