<p class="updated">Trang 12/19</p>
<p><span class="body">Lòng thành tín Chúa trải bao thế hệ. </span></p>
<p><span class="body">— lời Chúa luôn vững bền.</span></p>
<p><span class="body">Vinh danh Chúa Cha và Chúa Con,<br/>cùng vinh danh Thánh Thần Thiên Chúa,</span></p>
<p><span class="body">— Lạy Chúa, đến muôn đời muôn thuở,<br/>lời Chúa luôn vững bền.</span></p>
<div class="antiphon">
<span class="pre">ĐC:</span>
<span class="body">Thần trí tôi hớn hở vui mừng<br/>vì Thiên Chúa, Đấng cứu độ tôi.</span>
