    <p>Bà là Nữ Trạng Sư,<br/>
        Nguyện đưa mắt nhân từ,<br/>
        Phía đoàn con đoái lại ;</p>
<p class="split-block">Và sau đời khổ ải,<br/>Xin Bà khứng tỏ ra</p>
<p class="split-block">Cho đoàn con được thấy<br/>Quả phúc bởi lòng Bà :<br/>Đức Giê-su khả ái.</p>
<p>Ôi lượng cả khoan hồng,<br/>
        Ôi tấm lòng xót thương,<br/>
        Ôi dịu hiền nhân hậu,<br/>
        Trinh Nữ Ma-ri-a.</p>
