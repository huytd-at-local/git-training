    <p class="updated">Trang 7/47</p>

    <p><span class="verse-line"><sup>10</sup>
<span>
                    “Suốt bốn mươi năm,<br/>
                    dòng giống này làm Ta chán ngán,<br/>
                    Ta đã nói :<br/>
                    Đây là dân tâm hồn lầm lạc,
                </span></span></p>
<p><span class="verse-line"><sup>11</sup>
<span>
                    chúng nào biết đến đường lối của Ta ! <sup>*</sup><br/>
                    Nên Ta mới thịnh nộ thề rằng :<br/>
                    Chúng sẽ không được vào chốn yên nghỉ của Ta.”
                </span></span></p>
